<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盛桦学堂 · 我的</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: #1a1a2e;
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; padding: 40px 20px;
  }
  .phone-frame {
    width: 375px; min-height: 812px;
    background: #F5F6FA; border-radius: 40px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 2px #333;
    position: relative;
  }
  .status-bar {
    height: 44px; background: #FF7A45;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; padding-top: 12px;
  }
  .status-bar .time { font-size: 14px; font-weight: 600; color: #fff; }
  .status-bar .icons { display: flex; gap: 4px; font-size: 12px; color: #fff; }

  /* Hero */
  .hero {
    background: linear-gradient(135deg, #FF7A45, #FF9A6C);
    padding: 20px 20px 30px;
    position: relative; overflow: hidden;
  }
  .hero .deco {
    position: absolute; right: -30px; top: -30px;
    width: 120px; height: 120px; border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .hero .deco2 {
    position: absolute; left: 40px; bottom: -20px;
    width: 80px; height: 80px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .hero-content {
    display: flex; align-items: center; gap: 14px;
    position: relative; z-index: 1;
  }
  .hero-avatar {
    width: 60px; height: 60px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .hero-info { flex: 1; }
  .hero-name { font-size: 20px; font-weight: 700; color: #fff; }
  .hero-tags { display: flex; gap: 8px; margin-top: 6px; }
  .hero-tag {
    font-size: 11px; color: #fff; background: rgba(255,255,255,0.2);
    padding: 2px 10px; border-radius: 10px;
  }
  .hero-setting {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer;
  }

  /* Learning stats row */
  .stats-row {
    display: flex; justify-content: space-around;
    background: #fff; margin: -16px 16px 0; border-radius: 12px;
    padding: 16px; position: relative; z-index: 2;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .stats-item { text-align: center; cursor: pointer; }
  .stats-value { font-size: 20px; font-weight: 700; color: #1a1a1a; display: block; }
  .stats-label { font-size: 11px; color: #999; margin-top: 2px; display: block; }

  /* Order shortcuts */
  .order-section {
    background: #fff; margin: 12px 16px 0; border-radius: 12px; padding: 16px;
  }
  .order-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .order-title { font-size: 16px; font-weight: 600; color: #1a1a1a; }
  .order-all { font-size: 12px; color: #999; cursor: pointer; }
  .order-grid { display: flex; justify-content: space-around; }
  .order-item {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer; position: relative;
  }
  .order-item:active { opacity: 0.7; }
  .order-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: #F5F6FA;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; position: relative;
  }
  .order-dot {
    position: absolute; top: -4px; right: -4px;
    min-width: 16px; height: 16px; border-radius: 8px;
    background: #FF4D4F; color: #fff;
    font-size: 10px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px;
  }
  .order-label { font-size: 12px; color: #1a1a1a; font-weight: 500; }

  /* Function grid */
  .func-section {
    background: #fff; margin: 12px 16px 0; border-radius: 12px; padding: 16px 12px;
  }
  .func-section-title {
    font-size: 16px; font-weight: 600; color: #1a1a1a;
    margin-bottom: 14px; padding: 0 4px;
  }
  .func-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px 0;
  }
  .func-item {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer;
  }
  .func-item:active { opacity: 0.7; }
  .func-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .func-label { font-size: 12px; color: #1a1a1a; font-weight: 500; }

  /* Menu list */
  .menu-section {
    background: #fff; margin: 12px 16px 0; border-radius: 12px;
    overflow: hidden;
  }
  .menu-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid #f5f5f5;
    cursor: pointer;
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item:active { background: #fafafa; }
  .menu-left { display: flex; align-items: center; gap: 12px; }
  .menu-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .menu-text { font-size: 14px; color: #1a1a1a; font-weight: 500; }
  .menu-right { display: flex; align-items: center; gap: 4px; }
  .menu-badge {
    font-size: 11px; color: #fff; background: #FF4D4F;
    padding: 1px 6px; border-radius: 8px;
  }
  .menu-arrow { font-size: 14px; color: #ccc; }

  /* VIP card */
  .vip-card {
    background: linear-gradient(135deg, #2C2C2C, #1a1a1a);
    margin: 12px 16px 0; border-radius: 12px;
    padding: 16px; display: flex; align-items: center; gap: 14px;
    cursor: pointer;
  }
  .vip-card:active { opacity: 0.9; }
  .vip-icon { font-size: 28px; }
  .vip-info { flex: 1; }
  .vip-title { font-size: 15px; font-weight: 600; color: #FFD700; }
  .vip-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .vip-btn {
    font-size: 12px; color: #1a1a1a; background: #FFD700;
    padding: 6px 14px; border-radius: 14px; font-weight: 600;
  }

  /* Tab bar */
  .tab-bar {
    position: sticky; bottom: 0; background: #fff;
    display: flex; border-top: 1px solid #f0f0f0;
    padding: 6px 0; padding-bottom: 20px;
  }
  .tab-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 2px; cursor: pointer;
  }
  .tab-icon { font-size: 22px; color: #999; }
  .tab-icon.active { color: #FF7A45; }
  .tab-label { font-size: 10px; color: #999; }
  .tab-label.active { color: #FF7A45; font-weight: 600; }
  .bottom-spacer { height: 16px; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons"><span>📶</span><span>🔋</span></div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="deco"></div>
    <div class="deco2"></div>
    <div class="hero-content">
      <div class="hero-avatar">😊</div>
      <div class="hero-info">
        <div class="hero-name">张小明</div>
        <div class="hero-tags">
          <span class="hero-tag">VIP 会员</span>
          <span class="hero-tag">积分 1280</span>
        </div>
      </div>
      <div class="hero-setting">⚙️</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stats-item">
      <span class="stats-value">12</span>
      <span class="stats-label">已购课程</span>
    </div>
    <div class="stats-item">
      <span class="stats-value">86.5h</span>
      <span class="stats-label">学习时长</span>
    </div>
    <div class="stats-item">
      <span class="stats-value">3</span>
      <span class="stats-label">证书</span>
    </div>
    <div class="stats-item">
      <span class="stats-value">5</span>
      <span class="stats-label">优惠券</span>
    </div>
  </div>

  <!-- VIP -->
  <div class="vip-card">
    <span class="vip-icon">👑</span>
    <div class="vip-info">
      <div class="vip-title">开通 VIP 会员</div>
      <div class="vip-sub">全场课程 8 折 · 专属特权</div>
    </div>
    <span class="vip-btn">立即开通</span>
  </div>

  <!-- Orders -->
  <div class="order-section">
    <div class="order-header">
      <span class="order-title">我的订单</span>
      <span class="order-all">全部订单 →</span>
    </div>
    <div class="order-grid">
      <div class="order-item">
        <div class="order-icon">
          💳
          <span class="order-dot">2</span>
        </div>
        <span class="order-label">待付款</span>
      </div>
      <div class="order-item">
        <div class="order-icon">📦</div>
        <span class="order-label">待发货</span>
      </div>
      <div class="order-item">
        <div class="order-icon">
          🚚
          <span class="order-dot">1</span>
        </div>
        <span class="order-label">待收货</span>
      </div>
      <div class="order-item">
        <div class="order-icon">✅</div>
        <span class="order-label">已完成</span>
      </div>
    </div>
  </div>

  <!-- Tools -->
  <div class="func-section">
    <div class="func-section-title">学习工具</div>
    <div class="func-grid">
      <div class="func-item">
        <div class="func-icon" style="background:#FFF1F0;">🎫</div>
        <span class="func-label">优惠券</span>
      </div>
      <div class="func-item">
        <div class="func-icon" style="background:#FFF7E6;">✅</div>
        <span class="func-label">签到</span>
      </div>
      <div class="func-item">
        <div class="func-icon" style="background:#F6FFED;">🔥</div>
        <span class="func-label">限时特惠</span>
      </div>
      <div class="func-item">
        <div class="func-icon" style="background:#F0F5FF;">👥</div>
        <span class="func-label">拼团</span>
      </div>
      <div class="func-item">
        <div class="func-icon" style="background:#FFF0F6;">📍</div>
        <span class="func-label">地址管理</span>
      </div>
      <div class="func-item">
        <div class="func-icon" style="background:#E8FDF5;">🛒</div>
        <span class="func-label">购物车</span>
      </div>
      <div class="func-item">
        <div class="func-icon" style="background:#EEE8FD;">📊</div>
        <span class="func-label">分销中心</span>
      </div>
      <div class="func-item">
        <div class="func-icon" style="background:#FDE8E8;">💬</div>
        <span class="func-label">消息</span>
      </div>
    </div>
  </div>

  <!-- Menu -->
  <div class="menu-section">
    <div class="menu-item">
      <div class="menu-left">
        <div class="menu-icon" style="background:#E8F4FD;">📚</div>
        <span class="menu-text">我的课程</span>
      </div>
      <div class="menu-right">
        <span class="menu-arrow">›</span>
      </div>
    </div>
    <div class="menu-item">
      <div class="menu-left">
        <div class="menu-icon" style="background:#F6FFED;">👨‍🏫</div>
        <span class="menu-text">成为讲师</span>
      </div>
      <div class="menu-right">
        <span class="menu-arrow">›</span>
      </div>
    </div>
    <div class="menu-item">
      <div class="menu-left">
        <div class="menu-icon" style="background:#FFF7E6;">🏪</div>
        <span class="menu-text">商家入驻</span>
      </div>
      <div class="menu-right">
        <span class="menu-arrow">›</span>
      </div>
    </div>
    <div class="menu-item">
      <div class="menu-left">
        <div class="menu-icon" style="background:#FDE8E8;">🔔</div>
        <span class="menu-text">消息通知</span>
      </div>
      <div class="menu-right">
        <span class="menu-badge">3</span>
        <span class="menu-arrow">›</span>
      </div>
    </div>
    <div class="menu-item">
      <div class="menu-left">
        <div class="menu-icon" style="background:#F0F5FF;">❓</div>
        <span class="menu-text">帮助与反馈</span>
      </div>
      <div class="menu-right">
        <span class="menu-arrow">›</span>
      </div>
    </div>
  </div>

  <div class="bottom-spacer"></div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab-item">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">首页</span>
    </div>
    <div class="tab-item">
      <span class="tab-icon">📖</span>
      <span class="tab-label">学习</span>
    </div>
    <div class="tab-item">
      <span class="tab-icon">💬</span>
      <span class="tab-label">社区</span>
    </div>
    <div class="tab-item">
      <span class="tab-icon active">👤</span>
      <span class="tab-label active">我的</span>
    </div>
  </div>
</div>
</body>
</html>
